app = "grocery-haul"
primary_region = "iad"

[build]
  builder = "heroku/buildpacks:20"

[env]
  PHX_HOST = "grocery-haul.fly.dev"
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
